name: Release

on:
  push:
    tags: ["v*.*.*"]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libxkbcommon-dev libwayland-dev

      - name: Build
        run: cargo build --release

      - name: Strip binary
        run: strip target/release/vapor-activator

      - uses: actions/upload-artifact@v4
        with:
          name: vapor-activator-linux
          path: target/release/vapor-activator

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - uses: actions/upload-artifact@v4
        with:
          name: vapor-activator-windows
          path: target/release/vapor-activator.exe

  create-release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: vapor-activator-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            vapor-activator
            vapor-activator.exe
